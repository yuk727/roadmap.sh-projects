<!DOCTYPE html>
<html>
    <head>
        <title>Contact Form</title>
        <link href="./favicon.ico" type="image/x-icon" rel="icon">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <meta http-equiv="content-security-policy" content="default-src: 'self' 'unsafe-hashes', 'unsafe-inline'">
        <!--SEO meta tags-->
        <meta name="author" content="Yuko727">
        <meta name="description" content="Contact us webpage with a contact form">
        <meta name="keywords" content="contact, support, feedback, help, message, acme, acme support">
        <!--OG meta tags-->
        <meta property="og:url" content="https://github.com/yuk727/roadmap.sh-projects">
        <meta property="og:description" content="Contact us webpage with a contact form">
        <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Common_Seal_Phoca_vitulina.jpg/500px-Common_Seal_Phoca_vitulina.jpg">
        <meta property="og:title" content="SContact Form">
    </head>
    <body>
         <header>
            <p>Acme Support</p>
            <nav>
                <a href="#home">Home</a>
                <a href="#help">Help</a>
                <a href="#contact">Contact</a>
            </nav><br>
        </header>
        <hr>
        <main>
            <h1>Contact us</h1>
            <p>Send us a message and we will get back to you.</p>
            <form action="#submitted" method="POST">
                <label for="name">Full name</label>
                <input type="text" name="name" id="name" required><br><br>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" required><br><br>
                <label for="subject">Subject</label>
                <select name="subject" id="subject" required>
                    <option value="option 1">Option 1</option>
                    <option value="option 2">Option 2</option>
                    <option value="option 3">Option 3</option>
                </select><br><br>
                <label for="">Message</label>
                <textarea name="message" id="message" required minlength="30"></textarea><br><br>
                <fieldset>
                    <legend>How did you hear about us?</legend>
                    <input type="radio" name="source" id="search" value="search" required>
                    <label for="search">Search</label>
                    <input type="radio" name="source" id="friend" value="friend" required>
                    <label for="friend">Friend</label>
                    <input type="radio" name="source" id="media" value="media" required>
                    <label for="media">Social media</label>
                </fieldset><br>
                <input type="checkbox" name="updates" id="updates">
                <label for="updates">Send me product updates</label><br><br>
                <input type="submit" value="Send message">
            </form><br>
        </main>
        <hr>
        <footer>
            <p>@ 2026 Acme Support</p>
        </footer>
    </body>
</html>
